name: OCI ARM Retry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          curl -L -s https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh -o install.sh
          bash install.sh --accept-all-defaults >/dev/null 2>&1
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure OCI auth
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "${{ secrets.OCI_USER_OCID }}" \
            "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" \
            "${{ secrets.OCI_REGION }}" \
            "$HOME/.oci/key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Try to launch instance
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/sshkey.pub
          COUNT=$(oci compute instance list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --query "length(data[?\"display-name\"=='traccar-server' && \"lifecycle-state\"!='TERMINATED' && \"lifecycle-state\"!='TERMINATING'])" --raw-output 2>/dev/null)
          echo "Existing traccar-server instances: ${COUNT:-0}"
          if [ -n "$COUNT" ] && [ "$COUNT" != "0" ]; then
            echo "Instance already exists — nothing to do."
            exit 0
          fi
          out=$(oci compute instance launch \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "qoGE:AP-HYDERABAD-1-AD-1" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --image-id "ocid1.image.oc1.ap-hyderabad-1.aaaaaaaaqkushqsrkkiinw54mregtqje64j2zkfwfd75k3fi2pwksdjfqx5q" \
            --subnet-id "ocid1.subnet.oc1.ap-hyderabad-1.aaaaaaaak7vb3aqoj6xs3jzsudrdrixj5t6bu3ti7xd6cb64mazekdlk6ijq" \
            --assign-public-ip true \
            --display-name "traccar-server" \
            --ssh-authorized-keys-file /tmp/sshkey.pub \
            --boot-volume-size-in-gbs 50 \
            --no-retry 2>&1)
          echo "$out"
          if echo "$out" | grep -q '"id":'; then
            echo "SUCCESS — instance is launching!"
          elif echo "$out" | grep -qi "out of host capacity"; then
            echo "Out of capacity right now — will retry next run."
          else
            echo "Unexpected error — see output above."
            exit 1
          fi
